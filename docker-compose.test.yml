services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: byhadmade
      POSTGRES_PASSWORD: byhadmade_secret
      POSTGRES_DB: byhadmade
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U byhadmade"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: always
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://byhadmade:byhadmade_secret@postgres:5432/byhadmade
      - JWT_SECRET=byhadmade-jwt-secret-change-me
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PORT=3001
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
